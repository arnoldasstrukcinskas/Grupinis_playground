spring.application.name=Grupinis_playground-test
spring.docker.compose.enabled=false
server.port=0

external.api.key=test-key

spring.datasource.url=jdbc:h2:mem:grupinis_playground_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:3b
spring.ai.ollama.chat.options.temperature=0.3
