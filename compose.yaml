services:
  trip_advisor.server:
    container_name: trip_advisor.server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434

  trip_advisor.client:
    image: node:20-alpine
    container_name: shop.client
    working_dir: /app
    restart: no
    ports:
      - "5042:5042"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5042"
